name: Check commit author

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check-author:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify all commits authored by dev@isquantum.money
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=${{ github.event.pull_request.base.sha }}
            HEAD=${{ github.event.pull_request.head.sha }}
          else
            BASE=${{ github.event.before }}
            HEAD=${{ github.event.after }}
          fi

          # On first push (before is all zeros), check only the pushed commits
          if [ "$BASE" = "0000000000000000000000000000000000000000" ]; then
            RANGE="$HEAD"
            COMMITS=$(git log --format="%H" "$RANGE" 2>/dev/null || git log --format="%H" -1 "$HEAD")
          else
            COMMITS=$(git log --format="%H" "$BASE..$HEAD")
          fi

          FAILED=0
          for COMMIT in $COMMITS; do
            EMAIL=$(git log -1 --format="%ae" "$COMMIT")
            if [ "$EMAIL" != "dev@isquantum.money" ]; then
              echo "FAIL: $COMMIT authored by $EMAIL (expected dev@isquantum.money)"
              FAILED=1
            fi
          done

          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
          echo "All commits authored by dev@isquantum.money"
